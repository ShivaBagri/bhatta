<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funny Proposal</title>

<style>
  body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(135deg, #ffdde1, #ee9ca7);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    overflow: hidden;
  }

  .box {
    text-align: center;
    background: white;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    width: 90%;
    max-width: 420px;
    position: relative;
  }

  .question {
    font-size: 28px;
    margin-bottom: 25px;
    min-height: 80px;
    font-weight: bold;
  }

  .answer {
    font-size: 30px;
    color: green;
    font-weight: bold;
    margin-top: 20px;
    display: none;
  }

  button {
    padding: 14px 22px;
    border: none;
    color: white;
    font-size: 20px;
    border-radius: 12px;
    cursor: pointer;
    margin: 8px;
  }

  .yesBtn {
    background: hotpink;
    font-size: 22px;
    box-shadow: 0 0 15px hotpink;
  }

  .noBtn {
    background: #7ec8e3;
    position: absolute;
    left: 200px;
    top: 120px;
    font-size: 18px;
    color: white;
    box-shadow: 0 4px 12px rgba(126, 200, 227, 0.6);
  }

  .yesBtn:hover {
    background: deeppink;
  }

</style>
</head>

<body>

<div class="box" id="box">
  <div class="question" id="question">Click Start 💍</div>

  <button class="yesBtn" id="yesBtn">Bhatta 💖</button>

  <!-- 6 NO buttons -->
  <button class="noBtn">Matar Paneer</button>
  <button class="noBtn">Palak Paneer</button>
  <button class="noBtn">Dal Makhani</button>
  <button class="noBtn">Kadhi Chawal</button>
  <button class="noBtn">Aloo Gobhi</button>
  <button class="noBtn">Veg Biryani</button>

  <div class="answer" id="answer"></div>
</div>

<script>
const questions = [
  "आपकी पसंदीदा सब्जी कौन सी है??"
];

let index = 0;

const questionEl = document.getElementById("question");
const noBtns = document.querySelectorAll(".noBtn");
const answerEl = document.getElementById("answer");
const yesBtn = document.getElementById("yesBtn");
const box = document.getElementById("box");

function loadQuestion() {
  questionEl.innerText = questions[index];
}

loadQuestion();

// YES button
yesBtn.addEventListener("click", () => {
  if (index < questions.length - 1) {
    index++;
    loadQuestion();
  } else {
    questionEl.innerText = "Dekha Mera Guess";
    answerEl.style.display = "block";
    answerEl.innerText = "❤️ Mujhe pata tha aapko Bhatta pasand hai 😆";

    yesBtn.style.display = "none";
    noBtns.forEach(btn => btn.style.display = "none");
  }
});

// overlap check
function isOverlapping(x, y, rect, w, h) {
  return (
    x < rect.right &&
    x + w > rect.left &&
    y < rect.bottom &&
    y + h > rect.top
  );
}

// NO buttons movement
noBtns.forEach((noBtn) => {
  noBtn.addEventListener("mouseover", () => {

    const boxRect = box.getBoundingClientRect();
    const yesRect = yesBtn.getBoundingClientRect();

    const w = noBtn.offsetWidth;
    const h = noBtn.offsetHeight;

    let x, y, overlap;

    do {
      x = Math.random() * (window.innerWidth - 120);

      const minY = boxRect.top + 140;
      y = minY + Math.random() * (window.innerHeight - minY - 80);

      overlap = false;

      // avoid YES button
      if (isOverlapping(x, y, yesRect, w, h)) {
        overlap = true;
      }

      // avoid other NO buttons
      noBtns.forEach(other => {
        if (other !== noBtn) {
          const r = other.getBoundingClientRect();
          if (isOverlapping(x, y, r, w, h)) {
            overlap = true;
          }
        }
      });

    } while (overlap);

    noBtn.style.position = "fixed";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
  });
});
</script>

</body>
</html>
